<script type="text/babel">
const { useState, useCallback } = React;

var SCRIPTS = [
  { id: 1, label: "\uB300\uBCF8 1", target: 15000, tolerance: 2000, overMax: 5000 },
  { id: 2, label: "\uB300\uBCF8 2", target: 20000, tolerance: 2000, overMax: 5000 },
  { id: 3, label: "\uB300\uBCF8 3", target: 25000, tolerance: 2000, overMax: null },
];

/* ===== \uC815\uBCF4 \uCE74\uD14C\uACE0\uB9AC ===== */
var INFO_FORBIDDEN = ["\u26A0\uFE0F", "\uCD9C\uCC98:", "\u26A0\uFE0F \uBD88\uD655\uC2E4:"];

function hasAICopyTrace(text) {
  var variants = [
    "\u201C\uB2E4\uC74C\u201D \uB610\uB294 \u201C\uC624\uCF00\uC774\u201D \uC785\uB825\uD558\uC2DC\uBA74",
    '"\uB2E4\uC74C" \uB610\uB294 "\uC624\uCF00\uC774" \uC785\uB825\uD558\uC2DC\uBA74',
    "'\uB2E4\uC74C' \uB610\uB294 '\uC624\uCF00\uC774' \uC785\uB825\uD558\uC2DC\uBA74",
  ];
  return variants.some(function(v) { return text.includes(v); });
}

var INFO_H_TYPES = [
  { code: "H1", names: ["\uC190\uD574 \uAE08\uC561 \uD504\uB808\uC784", "\uC190\uD574 \uAE08\uC561", "\uC190\uD574\uAE08\uC561"] },
  { code: "H2", names: ["\uC704\uD5D8 \uC2E0\uD638 \uB098\uC5F4", "\uC704\uD5D8 \uC2E0\uD638", "\uC704\uD5D8\uC2E0\uD638"] },
  { code: "H3", names: ["\uB300\uD45C \uC2E4\uC218 \uC0C1\uD669", "\uC2E4\uC218 \uC0C1\uD669 \uBB18\uC0AC", "\uB300\uD45C \uC2E4\uC218", "\uC2E4\uC218 \uC0C1\uD669"] },
  { code: "H4", names: ["\uCDA9\uACA9 \uD1B5\uACC4", "\uCDA9\uACA9\uD1B5\uACC4"] },
  { code: "H5", names: ["\uC2DC\uCCAD\uC790 \uC9C1\uC811 \uC9C8\uBB38", "\uC9C1\uC811 \uC9C8\uBB38", "\uC2DC\uCCAD\uC790 \uC9C8\uBB38"] },
  { code: "H6", names: ["\uBC18\uC804 \uC0AC\uC2E4", "\uBC18\uC804\uC0AC\uC2E4"] },
  { code: "H7", names: ["\uAE34\uAE09\uC131 \uAC15\uC870", "\uAE34\uAE09\uC131\uAC15\uC870", "\uC2DC\uAC04 \uC555\uBC15"] },
  { code: "H8", names: ["Before/After", "before/after", "\uBE44\uD3EC\uC560\uD504\uD130", "\uC804\uD6C4 \uB300\uBE44", "\uC804/\uD6C4"] },
];

var INFO_C_TYPES = [
  { code: "C1", names: ["\uC190\uD574 \uD568\uC815", "\uC190\uD574\uD568\uC815"] },
  { code: "C2", names: ["\uAE30\uC900 \uC22B\uC790", "\uAE30\uC900\uC22B\uC790"] },
  { code: "C3", names: ["\uD754\uD55C \uCC29\uAC01", "\uD754\uD55C\uCC29\uAC01"] },
  { code: "C4", names: ["\uC2E4\uC218 \uC0AC\uB840", "\uC2E4\uC218\uC0AC\uB840", "\uC2DC\uB098\uB9AC\uC624"] },
  { code: "C5", names: ["\uCCB4\uD06C\uB9AC\uC2A4\uD2B8"] },
  { code: "C6", names: ["\uC2E4\uD589 \uB2E8\uACC4", "\uC2E4\uD589\uB2E8\uACC4"] },
  { code: "C7", names: ["\uC5F0\uACC4 \uC81C\uB3C4 \uBE44\uAD50", "\uC5F0\uACC4 \uC81C\uB3C4", "\uC5F0\uACC4\uC81C\uB3C4", "\uC81C\uB3C4 \uBE44\uAD50"] },
  { code: "C8", names: ["\uD30C\uC0DD \uC8FC\uC81C", "\uD30C\uC0DD\uC8FC\uC81C", "\uB525\uB2E4\uC774\uBE0C", "\uAE4A\uC774 \uC124\uBA85"] },
  { code: "C9", names: ["Q&A", "q&a", "\uC790\uC8FC \uBB3B\uB294 \uC9C8\uBB38", "\uC790\uC8FC\uBB3B\uB294\uC9C8\uBB38"] },
  { code: "C10", names: ["\uD0C0\uC784\uB77C\uC778", "\uC6D4\uBCC4", "\uC5F0\uB3C4\uBCC4", "\uC218\uB839 \uD750\uB984"] },
  { code: "C11", names: ["\uAE08\uC561 \uC2DC\uBBAC\uB808\uC774\uC158", "\uAE08\uC561\uC2DC\uBBAC\uB808\uC774\uC158", "\uC2DC\uBBAC\uB808\uC774\uC158", "\uAC00\uC0C1 \uC778\uBB3C"] },
  { code: "C12", names: ["\uC2E4\uBB34 \uD301", "\uC2E4\uBB34\uD301", "\uC2E4\uC6A9 \uC815\uBCF4"] },
];

/* ===== \uC5ED\uC0AC \uCE74\uD14C\uACE0\uB9AC ===== */
var HIST_H_TYPES = [
  { code: "A", names: ["\uC7A5\uBA74 \uBB18\uC0AC\uD615", "\uC7A5\uBA74 \uBB18\uC0AC", "\uC7A5\uBA74\uBB18\uC0AC"] },
  { code: "B", names: ["\uC2E4\uB85D/\uAE30\uB85D \uC778\uC6A9\uD615", "\uC2E4\uB85D \uC778\uC6A9", "\uAE30\uB85D \uC778\uC6A9\uD615", "\uC2E4\uB85D\uC778\uC6A9"] },
  { code: "C", names: ["\uC0C1\uC2DD \uD30C\uAD34\uD615", "\uC0C1\uC2DD \uD30C\uAD34", "\uC0C1\uC2DD\uD30C\uAD34"] },
  { code: "D", names: ["\uACB0\uB860 \uBA3C\uC800\uD615", "\uACB0\uB860 \uBA3C\uC800", "\uACB0\uB860\uBA3C\uC800"] },
  { code: "E", names: ["\uC22B\uC790 \uCDA9\uACA9\uD615", "\uC22B\uC790 \uCDA9\uACA9", "\uC22B\uC790\uCDA9\uACA9"] },
  { code: "F", names: ["\uB300\uBE44/\uBE44\uAD50\uD615", "\uB300\uBE44 \uBE44\uAD50", "\uB300\uBE44/\uBE44\uAD50", "\uB300\uBE44\uBE44\uAD50"] },
  { code: "G", names: ["\uC778\uBB3C \uB300\uC0AC\uD615", "\uC778\uBB3C \uB300\uC0AC", "\uC778\uBB3C\uB300\uC0AC"] },
  { code: "H", names: ["\uC9C8\uBB38 \uC9C1\uAD6C\uD615", "\uC9C8\uBB38 \uC9C1\uAD6C", "\uC9C8\uBB38\uC9C1\uAD6C"] },
];

var HIST_ARR_TYPES = [
  { code: "A", names: ["\uC2DC\uAC04\uC21C \uC815\uC8FC\uD589", "\uC2DC\uAC04\uC21C", "\uC815\uC8FC\uD589"] },
  { code: "B", names: ["\uACB0\uB9D0 \uBA3C\uC800", "\uC5ED\uCD94\uC801", "\uACB0\uB9D0\uBA3C\uC800"] },
  { code: "C", names: ["\uBBF8\uC2A4\uD130\uB9AC \uC218\uC0AC\uD615", "\uBBF8\uC2A4\uD130\uB9AC \uC218\uC0AC", "\uC218\uC0AC\uD615"] },
  { code: "D", names: ["\uB450 \uCD95 \uAD50\uCC28 \uD3B8\uC9D1", "\uAD50\uCC28 \uD3B8\uC9D1", "\uB450 \uCD95 \uAD50\uCC28", "\uAD50\uCC28\uD3B8\uC9D1"] },
  { code: "E", names: ["\uB3D9\uC2EC\uC6D0 \uD655\uC7A5\uD615", "\uB3D9\uC2EC\uC6D0 \uD655\uC7A5", "\uB3D9\uC2EC\uC6D0"] },
  { code: "F", names: ["\uD1B5\uB150 \uD30C\uAD34", "\uC7AC\uAC74", "\uD1B5\uB150 \uD30C\uAD34 \uC7AC\uAC74", "\uD1B5\uB150\uD30C\uAD34"] },
  { code: "G", names: ["\uAC10\uC815 \uB864\uB7EC\uCF54\uC2A4\uD130", "\uAC10\uC815 \uB864\uB7EC\uCF54\uC2A4\uD130", "\uB864\uB7EC\uCF54\uC2A4\uD130"] },
  { code: "H", names: ["\uC9C8\uBB38 \uC0AC\uB2E4\uB9AC\uD615", "\uC9C8\uBB38 \uC0AC\uB2E4\uB9AC", "\uC0AC\uB2E4\uB9AC\uD615"] },
];

/* ===== \uACF5\uD1B5 ===== */
var CTA_KEYWORDS = [
  "\uAD6C\uB3C5", "\uC88B\uC544\uC694", "\uC54C\uB9BC", "\uB313\uAE00",
  "\uC88B\uC544\uC694\uC640 \uAD6C\uB3C5", "\uAD6C\uB3C5\uACFC \uC88B\uC544\uC694",
  "\uC88B\uC544\uC694 \uBC84\uD2BC", "\uAD6C\uB3C5 \uBC84\uD2BC",
  "\uC54C\uB9BC \uC124\uC815", "\uAD6C\uB3C5\uD574", "\uC88B\uC544\uC694\uB97C",
  "\uB20C\uB7EC", "\uC54C\uB824\uC8FC\uC138\uC694", "\uB0A8\uACE8\uC8FC\uC138\uC694",
  "\uC751\uC6D0", "\uCC44\uB110",
];

var META_TOPIC = { key: "\uC8FC\uC81C", patterns: ["\uC8FC\uC81C"] };
var META_INTRO_INFO = { key: "\uB3C4\uC785\uC720\uD615", patterns: ["\uB3C4\uC785 \uC720\uD615", "\uB3C4\uC785\uC720\uD615"] };
var META_ARR_INFO = { key: "\uAD6C\uC131\uC21C\uC11C", patterns: ["\uAD6C\uAC04 \uAD6C\uC131", "\uAD6C\uAC04\uAD6C\uC131", "\uAD6C\uC131\uC21C\uC11C", "\uAD6C\uC131 \uC21C\uC11C", "\uBC30\uC5F4"] };
var META_INTRO_HIST = { key: "\uB3C4\uC785\uC720\uD615", patterns: ["\uB3C4\uC785 \uC720\uD615", "\uB3C4\uC785\uC720\uD615", "\uB3C4\uC785\uBD80 \uC720\uD615", "\uB3C4\uC785\uBD80\uC720\uD615"] };
var META_ARR_HIST = { key: "\uBC30\uC5F4\uC804\uB7B5", patterns: ["\uBC30\uC5F4 \uC804\uB7B5", "\uBC30\uC5F4\uC804\uB7B5", "\uAD6C\uC131\uC21C\uC11C", "\uAD6C\uC131 \uC21C\uC11C", "\uAD6C\uAC04 \uAD6C\uC131"] };

function hasCTA(section) { return CTA_KEYWORDS.some(function(kw) { return section.includes(kw); }); }

function extractMetaValue(headerLines, field) {
  for (var i = 0; i < headerLines.length; i++) {
    for (var j = 0; j < field.patterns.length; j++) {
      var idx = headerLines[i].indexOf(field.patterns[j]);
      if (idx !== -1) {
        var after = headerLines[i].slice(idx + field.patterns[j].length).replace(/^[\s::\-\u2013\u2014|]+/, "").trim();
        return after || headerLines[i].trim();
      }
    }
  }
  return null;
}

function extractTypes(headerText, typeList, codeRegex) {
  var found = [];
  var m = headerText.match(codeRegex);
  if (m) m.forEach(function(x) { if (found.indexOf(x) === -1) found.push(x); });
  typeList.forEach(function(t) {
    if (found.indexOf(t.code) === -1 && t.names.some(function(n) { return headerText.includes(n); })) found.push(t.code);
  });
  return found;
}

function getLabel(code, typeList) {
  var t = typeList.find(function(x) { return x.code === code; });
  return t ? code + ": " + t.names[0] : code;
}

var OLD_DATE = [/20(?:1\d|2[0-4])\uB144\s*(?:\uAE30\uC900|\uD604\uC7AC|\uD604\uD589|\uC801\uC6A9|\uC2DC\uD589)/, /2025\uB144\s*(?:\uAE30\uC900|\uD604\uC7AC|\uD604\uD589|\uC801\uC6A9|\uC2DC\uD589)/];
var FRESH_DATE = [/2026\uB144/, /\uC62C\uD574/, /\uD604\uC7AC\s*\uAE30\uC900/, /\uCD5C\uC2E0/];

function gwa(n) { return n === 2 ? "\uC640" : "\uACFC"; }

function analyzeScript(text, config, category) {
  var len = text.length;
  var lenNoSpace = text.replace(/\s/g, "").length;
  var min = config.target - config.tolerance;
  var overLimit = config.overMax ? config.target + config.overMax : null;
  var issues = [];
  var friendlyIssues = [];
  var isInfo = category === "info";

  // \uAE00\uC790\uC218
  if (len < min) {
    issues.push("charShort");
    friendlyIssues.push("\uAE30\uC900 " + config.target.toLocaleString() + "\uC790\uC778\uB370 " + len.toLocaleString() + "\uC790\uB85C \uB098\uC640\uC694~ \uB300\uBCF8 \uB298\uB824\uC8FC\uC138\uC694!");
  } else if (overLimit && len > overLimit) {
    issues.push("charOver");
    friendlyIssues.push("\uAE30\uC900 " + config.target.toLocaleString() + "\uC790\uC778\uB370 " + len.toLocaleString() + "\uC790\uB85C \uB108\uBB34 \uB9CE\uC544\uC694~ \uC870\uAE08 \uC904\uC5EC\uC8FC\uC138\uC694!");
  }

  // \uAE08\uC9C0 \uD0A4\uC6CC\uB4DC (\uC815\uBCF4\uB9CC)
  if (isInfo) {
    var foundForbidden = INFO_FORBIDDEN.filter(function(kw) { return text.includes(kw); });
    if (foundForbidden.length > 0) {
      issues.push("forbidden");
      friendlyIssues.push("\uD734\uBA3C\uD130\uCE58 \uC548 \uD558\uC2E0 \uAC8C \uBCF4\uC5EC\uC694~ \uBD88\uD655\uC2E4, \uCD9C\uCC98 \uAE30\uD638 \uCCB4\uD06C\uD574\uC8FC\uC138\uC694!");
    }
  }

  // AI \uBCF5\uBD99 (\uACF5\uD1B5)
  if (hasAICopyTrace(text)) {
    issues.push("aiCopy");
    friendlyIssues.push("AI \uBCF5\uBD99 \uADF8\uB300\uB85C \uD558\uC2E0 \uBD80\uBD84\uC774 \uC788\uC5B4\uC694~ \uCCB4\uD06C\uD574\uC8FC\uC138\uC694!");
  }

  // \uC0C1\uB2E8 \uBA54\uD0C0
  var headerLines = text.split("\n").slice(0, 20);
  var headerText = headerLines.join("\n");
  var metaPresent = {};
  var metaValues = {};

  // \uC8FC\uC81C
  var topicVal = extractMetaValue(headerLines, META_TOPIC);
  metaPresent["\uC8FC\uC81C"] = !!topicVal;
  metaValues["\uC8FC\uC81C"] = topicVal;

  // \uB3C4\uC785\uC720\uD615
  var introField = isInfo ? META_INTRO_INFO : META_INTRO_HIST;
  var hTypeList = isInfo ? INFO_H_TYPES : HIST_H_TYPES;
  var hCodeRegex = isInfo ? /H[1-8]/g : /[A-H](?=[\s::\-\u2013\u2014|,\uFF1A]|$)/g;
  var hCodes = extractTypes(headerText, hTypeList, hCodeRegex);
  // \uD5E4\uB354\uC5D0\uC11C \uD0A4\uC6CC\uB4DC\uB85C\uB3C4 \uCCB4\uD06C
  if (hCodes.length === 0) {
    var introVal = extractMetaValue(headerLines, introField);
    if (introVal) {
      hCodes = extractTypes(introVal, hTypeList, hCodeRegex);
      if (hCodes.length === 0) hCodes = ["custom:" + introVal];
    }
  }
  metaPresent["\uB3C4\uC785\uC720\uD615"] = hCodes.length > 0;
  metaValues["\uB3C4\uC785\uC720\uD615"] = hCodes.length > 0 ? hCodes.map(function(c) { return c.indexOf("custom:") === 0 ? c.slice(7) : getLabel(c, hTypeList); }).join(", ") : null;

  // \uAD6C\uC131\uC21C\uC11C / \uBC30\uC5F4\uC804\uB7B5
  var arrField = isInfo ? META_ARR_INFO : META_ARR_HIST;
  var arrLabel = isInfo ? "\uAD6C\uC131\uC21C\uC11C" : "\uBC30\uC5F4\uC804\uB7B5";
  var cTypeList = isInfo ? INFO_C_TYPES : HIST_ARR_TYPES;
  var cCodeRegex = isInfo ? /C(?:1[0-2]|[1-9])(?!\d)/g : /\uC804\uB7B5\s*[A-H]|[A-H](?=[\s::\.\-])/g;
  var cCodes = extractTypes(headerText, cTypeList, cCodeRegex);
  if (cCodes.length === 0) {
    var arrVal = extractMetaValue(headerLines, arrField);
    if (arrVal) {
      cCodes = extractTypes(arrVal, cTypeList, cCodeRegex);
      if (cCodes.length === 0) cCodes = ["custom:" + arrVal];
    }
  }
  metaPresent[arrLabel] = cCodes.length > 0;
  metaValues[arrLabel] = cCodes.length > 0 ? cCodes.map(function(c) { return c.indexOf("custom:") === 0 ? c.slice(7) : getLabel(c, cTypeList); }).join(" \u2192 ") : null;

  var metaFields = ["\uC8FC\uC81C", "\uB3C4\uC785\uC720\uD615", arrLabel];
  var missingMeta = metaFields.filter(function(k) { return !metaPresent[k]; });
  if (missingMeta.length > 0) {
    issues.push("metaMissing");
    friendlyIssues.push("\uC0C1\uB2E8\uC5D0 " + missingMeta.join(", ") + "\uAC00 \uBE60\uC84C\uC5B4\uC694~ \uCD94\uAC00\uD574\uC8FC\uC138\uC694!");
  }

  // \uB0A0\uC9DC (\uC815\uBCF4\uB9CC)
  var hasOldDate = false;
  var hasFreshDate = false;
  if (isInfo) {
    hasOldDate = OLD_DATE.some(function(r) { return r.test(text); });
    hasFreshDate = FRESH_DATE.some(function(r) { return r.test(text); });
    if (hasOldDate && !hasFreshDate) {
      issues.push("oldDate");
      friendlyIssues.push("2026\uB144 \uCD5C\uC2E0 \uAE30\uC900\uC73C\uB85C \uC5C5\uB370\uC774\uD2B8\uD574\uC8FC\uC138\uC694!");
    }
  }

  // CTA (\uCC38\uACE0)
  var introEnd = Math.floor(len * 0.2);
  var outroStart = Math.floor(len * 0.8);
  var hasIntroCTA = hasCTA(text.slice(0, introEnd));
  var hasOutroCTA = hasCTA(text.slice(outroStart));

  return {
    charCount: len, charCountNoSpace: lenNoSpace,
    min: min, overLimit: overLimit, target: config.target,
    issues: issues, friendlyIssues: friendlyIssues,
    hasIntroCTA: hasIntroCTA, hasOutroCTA: hasOutroCTA,
    metaPresent: metaPresent, metaValues: metaValues,
    metaFields: metaFields, arrLabel: arrLabel,
    hasOldDate: hasOldDate, hasFreshDate: hasFreshDate,
    hCodes: hCodes, cCodes: cCodes,
    category: category,
  };
}

function checkDuplicates(allResults) {
  var dupIssues = [{}, {}, {}];
  var dupFriendly = [{}, {}, {}];
  if (!allResults[0]) return { dupIssues: dupIssues, dupFriendly: dupFriendly };

      </div>

      <div style={{ display: "flex", gap: "8px", marginTop: "16px" }}>
        <button onClick={handleReviewAll} disabled={filledCount === 0} style={{ flex: 1, padding: "13px", borderRadius: "12px", border: "none", background: filledCount > 0 ? "#1565C0" : "#ccc", color: "#fff", fontSize: "15px", fontWeight: 700, cursor: filledCount > 0 ? "pointer" : "not-allowed", fontFamily: "'Pretendard', sans-serif" }}>
          {filledCount === 3 ? "3\uAC1C \uB300\uBCF8 \uD1B5\uD569 \uAC80\uD1A0" : "\uC785\uB825\uB41C \uB300\uBCF8 \uAC80\uD1A0 (" + filledCount + "/3)"}
        </button>
        <button onClick={handleReset} style={{ padding: "13px 20px", borderRadius: "12px", border: "1.5px solid var(--border-color, #ddd)", background: "none", fontSize: "14px", fontWeight: 600, cursor: "pointer", color: "var(--text-secondary, #666)", fontFamily: "'Pretendard', sans-serif" }}>{"\uCD08\uAE30\uD654"}</button>
      </div>

      {unified && (<div style={{ marginTop: "16px", padding: "20px", borderRadius: "16px", background: unified.passed ? "rgba(46,125,50,0.06)" : "rgba(230,81,0,0.06)", border: "2px solid " + (unified.passed ? "#A5D6A7" : "#FFCC80") }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
          <span style={{ fontSize: "16px", fontWeight: 800, color: "var(--text-primary, #1a1a1a)" }}>{"\uD1B5\uD569 \uACB0\uACFC"}</span>
          <Badge passed={unified.passed} />
        </div>
        <div style={{ padding: "14px", borderRadius: "10px", background: "var(--card-bg, #fff)", border: "1px solid var(--border-color, #e5e5e5)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "10px" }}>
            <span style={{ fontSize: "12px", fontWeight: 700, color: "var(--text-secondary, #888)" }}>{"\uD83D\uDCCB \uB313\uAE00 \uD15C\uD50C\uB9BF"}</span>
            <button onClick={function() { if (!unified) return; navigator.clipboard.writeText(unified.text).then(function() { setCopied(true); setTimeout(function() { setCopied(false); }, 1500); }); }} style={{ padding: "5px 14px", borderRadius: "6px", border: "1px solid var(--border-color, #ddd)", background: copied ? "#E8F5E9" : "none", fontSize: "12px", fontWeight: 600, cursor: "pointer", color: copied ? "#2E7D32" : "var(--text-secondary, #666)", fontFamily: "'Pretendard', sans-serif" }}>
              {copied ? "\u2713 \uBCF5\uC0AC\uB428" : "\uBCF5\uC0AC"}
            </button>
          </div>
          <pre style={{ margin: 0, fontSize: "13px", lineHeight: 1.7, whiteSpace: "pre-wrap", wordBreak: "break-word", color: "var(--text-primary, #333)", fontFamily: "'Pretendard', sans-serif" }}>{unified.text}</pre>
        </div>
      </div>)}

      <div style={{ marginTop: "20px", padding: "14px", borderRadius: "12px", background: "var(--card-bg, #f8f9fa)", border: "1px solid var(--border-color, #e5e5e5)" }}>
        <div style={{ fontSize: "12px", fontWeight: 700, color: "var(--text-secondary, #888)", marginBottom: "8px" }}>{"\uAC80\uD1A0 \uAE30\uC900 (" + catLabel + ")"}</div>
        <div style={{ fontSize: "13px", color: "var(--text-primary, #555)", lineHeight: 1.9 }}>
          <div><span style={{ color: "#BF360C", fontWeight: 700 }}>{"\uBC18\uB824"}</span>{" \u2022 \uC0C1\uB2E8\uC5D0 \uC8FC\uC81C, \uB3C4\uC785\uC720\uD615, " + (category === "info" ? "\uAD6C\uC131\uC21C\uC11C" : "\uBC30\uC5F4\uC804\uB7B5") + " \uC5C6\uC73C\uBA74"}</div>
          <div><span style={{ color: "#BF360C", fontWeight: 700 }}>{"\uBC18\uB824"}</span>{" \u2022 3\uAC1C \uB300\uBCF8 \uAC04 \uC8FC\uC81C \u00B7 \uB3C4\uC785\uC720\uD615 \u00B7 " + (category === "info" ? "\uAD6C\uC131\uC21C\uC11C" : "\uBC30\uC5F4\uC804\uB7B5") + " \uC911\uBCF5 \uC2DC"}</div>
          <div><span style={{ color: "#BF360C", fontWeight: 700 }}>{"\uBC18\uB824"}</span>{" \u2022 \uAE00\uC790\uC218 \uBD80\uC871(\uAE30\uC900 -2,000\uC790 \uBBF8\uB9CC) / \uB300\uBCF8 1\u00B72 \uCD08\uACFC(+5,000\uC790 \uC774\uC0C1) / \uB300\uBCF8 3 \uCD08\uACFC \uC81C\uD55C \uC5C6\uC74C"}</div>
          {category === "info" && (<div><span style={{ color: "#BF360C", fontWeight: 700 }}>{"\uBC18\uB824"}</span>{" \u2022 \u26A0\uFE0F / \uCD9C\uCC98: / \u26A0\uFE0F \uBD88\uD655\uC2E4: \uD0A4\uC6CC\uB4DC \uD3EC\uD568"}</div>)}
          <div><span style={{ color: "#BF360C", fontWeight: 700 }}>{"\uBC18\uB824"}</span>{" \u2022 \u201C\uB2E4\uC74C\u201D \uB610\uB294 \u201C\uC624\uCF00\uC774\u201D \uC785\uB825\uD558\uC2DC\uBA74 \uBB38\uAD6C \uB4F1 AI \uBCF5\uBD99 \uD754\uC801"}</div>
          {category === "info" && (<div><span style={{ color: "#BF360C", fontWeight: 700 }}>{"\uBC18\uB824"}</span>{" \u2022 \uACFC\uAC70 \uAE30\uC900(2025\uB144 \uC774\uC804) \uB0A0\uC9DC\uB9CC \uC788\uACE0 2026\uB144 \uAE30\uC900 \uC815\uBCF4 \uC5C6\uC744 \uB54C"}</div>)}
          <div style={{ color: "var(--text-secondary, #999)" }}><span style={{ fontWeight: 700 }}>{"\uCC38\uACE0"}</span>{" \u2022 \uB3C4\uC785\uBD80/\uB9C8\uBB34\uB9AC CTA \uC720\uB3C4 \uBA58\uD2B8 \uC720\uBB34 (\uBC18\uB824 \uAE30\uC900 \uC544\uB2D8)"}</div>
        </div>
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
